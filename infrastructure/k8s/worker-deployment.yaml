apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: image-resizer-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: 882945281705.dkr.ecr.us-east-1.amazonaws.com/image-resizer-worker:latest

          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: redis

          envFrom:
            - secretRef:
                name: app-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
