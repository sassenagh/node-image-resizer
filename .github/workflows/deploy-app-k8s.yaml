name: App Deploy

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "api/**"
      - "worker/**"
      - "docker/**"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_API_REPO: image-resizer-api
  ECR_WORKER_REPO: image-resizer-worker
  CLUSTER_NAME: image-resizer-cluster
  K8S_NAMESPACE: image-resizer-ns

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get caller identity
        id: caller
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ARN=$(aws sts get-caller-identity --query Arn --output text)

          echo "Account: $ACCOUNT_ID"
          echo "Arn: $ARN"

          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "CALLER_ARN=$ARN" >> $GITHUB_ENV

      - name: Grant EKS access to this identity
        run: |
          echo "Using ARN: $CALLER_ARN"

          if ! aws eks describe-access-entry \
            --cluster-name $CLUSTER_NAME \
            --region $AWS_REGION \
            --principal-arn $CALLER_ARN >/dev/null 2>&1; then

            echo "Creating access entry..."

            aws eks create-access-entry \
              --cluster-name $CLUSTER_NAME \
              --region $AWS_REGION \
              --principal-arn $CALLER_ARN \
              --type STANDARD

            aws eks associate-access-policy \
              --cluster-name $CLUSTER_NAME \
              --region $AWS_REGION \
              --principal-arn $CALLER_ARN \
              --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
              --access-scope type=cluster

          else
            echo "Access entry already exists, skipping"
          fi

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Detect API changes
        id: api_changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^api/|^docker/api.Dockerfile'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect Worker changes
        id: worker_changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^worker/|^docker/worker.Dockerfile'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check API image
        id: api_image
        run: |
          if aws ecr describe-images \
            --repository-name $ECR_API_REPO \
            --image-ids imageTag=$GITHUB_SHA \
            --region $AWS_REGION >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Worker image
        id: worker_image
        run: |
          if aws ecr describe-images \
            --repository-name $ECR_WORKER_REPO \
            --image-ids imageTag=$GITHUB_SHA \
            --region $AWS_REGION >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push API
        if: steps.api_image.outputs.exists == 'false' || steps.api_changes.outputs.changed == 'true'
        run: |
          docker build -t $ECR_API_REPO -f docker/api.Dockerfile .
          docker tag $ECR_API_REPO:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_API_REPO:$IMAGE_TAG
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_API_REPO:$IMAGE_TAG

      - name: Build & Push Worker
        if: steps.worker_image.outputs.exists == 'false' || steps.worker_changes.outputs.changed == 'true'
        run: |
          docker build -t $ECR_WORKER_REPO -f docker/worker.Dockerfile .
          docker tag $ECR_WORKER_REPO:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WORKER_REPO:$IMAGE_TAG
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WORKER_REPO:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Debug EKS status
        run: |
          echo "Cluster status:"
          aws eks describe-cluster --name $CLUSTER_NAME --region $AWS_REGION --query 'cluster.status' --output table
          echo "Kubeconfig context:"
          kubectl config current-context

      - name: Wait for EKS API
        run: |
          echo "waiting for cluster active..."
          aws eks wait cluster-active --name $CLUSTER_NAME --region $AWS_REGION --no-cli-pager

          echo "kubectl access..."
          for i in {1..20}; do
            if kubectl cluster-info >/dev/null 2>&1; then
              echo "✅ EKS API + kubectl ready"
              kubectl get nodes || true
              break
            fi
            echo "kubectl waiting... $i/20"
            sleep 10
          done

      - name: Create namespace + secrets
        run: |
          kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f - || true

          kubectl create secret generic app-secrets \
            --namespace=$K8S_NAMESPACE \
            --from-literal=AWS_REGION=${{ secrets.AWS_REGION }} \
            --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f - || true

          echo "Namespace + secrets ready"

      - name: Deploy manifests
        run: kubectl apply -f infrastructure/k8s/

      - name: Deploy ArgoCD App
        run: |
          kubectl create namespace argocd || true
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.9.8/manifests/install.yaml

      - name: Update deployment images
        if: steps.api_image.outputs.exists == 'false' || steps.api_changes.outputs.changed == 'true' || steps.worker_image.outputs.exists == 'false' || steps.worker_changes.outputs.changed == 'true'
        run: |
          kubectl set image deployment/api api=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_API_REPO:$IMAGE_TAG -n $K8S_NAMESPACE
          kubectl set image deployment/worker worker=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_WORKER_REPO:$IMAGE_TAG -n $K8S_NAMESPACE
